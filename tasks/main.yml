---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - python3-pip
    state: present
    update_cache: true

- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Clone DFIR-IRIS repository
  ansible.builtin.git:
    repo: https://github.com/dfir-iris/iris-web.git
    dest: "{{ ludus_dfir_iris_install_path }}"
    version: "{{ ludus_dfir_iris_version }}"
    force: true

- name: Template environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ ludus_dfir_iris_install_path }}/.env"
    mode: "0600"
  notify: Restart DFIR-IRIS

- name: Pull DFIR-IRIS Docker images
  ansible.builtin.shell: docker compose pull
  args:
    chdir: "{{ ludus_dfir_iris_install_path }}"

- name: Start DFIR-IRIS
  ansible.builtin.shell: docker compose up -d
  args:
    chdir: "{{ ludus_dfir_iris_install_path }}"

- name: Wait for DFIR-IRIS to be available
  ansible.builtin.uri:
    url: "https://127.0.0.1:{{ ludus_dfir_iris_https_port }}"
    validate_certs: false
    status_code: [200, 302]
  register: iris_health
  until: iris_health.status in [200, 302]
  retries: 30
  delay: 10

- name: Print DFIR-IRIS access information
  ansible.builtin.debug:
    msg: |
      DFIR-IRIS is now running!
      URL: https://{{ ansible_default_ipv4.address }}:{{ ludus_dfir_iris_https_port }}
      Default credentials: admin / {{ ludus_dfir_iris_admin_password }}
